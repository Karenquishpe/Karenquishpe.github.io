<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue sur mon site</title>
    <style>
        body {
            background-color: #f4f1f7; /* Rose pastel clair */
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h1 {
            color: #9b59b6; /* Violet pastel */
            font-size: 3em;
            margin-bottom: 20px;
        }
        p {
            color: #d6336c; /* Rose pastel foncé */
            font-size: 1.5em;
            margin-bottom: 20px;
        }
        .container {
            background-color: #f9d9e0; /* Rose pastel très clair */
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bienvenue sur mon site GitHub Pages !</h1>
        <p>Voici une page créée pour montrer mes intérêts et mes projets.</p>
        <p>Je suis passionné par la programmation et le développement web. J'espère que vous apprécierez mon site !</p>
    </div>
</body>
